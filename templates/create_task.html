{% extends "layout.html" %}

{% block title %}Create Task{% endblock %}

{% block content %}
<div class="container">
  <section class="form-page">

    <div class="form-card">
      <div class="form-header">
        <h2>Create Task</h2>
        <p class="form-subtitle">
          Project: <strong>{{ project.name }}</strong>
        </p>
      </div>

      <form method="POST" class="styled-form">

        <div class="form-group">
          <label for="name">Task Name</label>
          <input type="text" id="name" name="name" required placeholder="Enter task name">
        </div>

        <div class="form-group">
          <label for="description">Description</label>
          <textarea id="description" name="description" rows="4" placeholder="Enter task description"></textarea>
        </div>

        <div class="form-group">
          <label for="priority">Priority</label>
          <select name="priority" id="priority" required>
            <option value="">-- Select Priority --</option>
            <option value="Low">Low</option>
            <option value="Medium">Medium</option>
            <option value="High">High</option>
          </select>
        </div>

        <div class="form-group">
          <label for="deadline">Deadline</label>
          <input type="date" name="deadline" id="deadline">
        </div>

        <div class="form-group">
          <label for="assignees">Assign Members</label>
          <select name="assignees" id="assignees" multiple>
            {% for member in members %}
              <option value="{{ member.id }}">{{ member.name }}</option>
            {% endfor %}
          </select>
          <small class="muted">Hold Ctrl (Windows) or Cmd (Mac) to select multiple users.</small>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Create Task</button>
          <a href="{{ url_for('project_details', id=project.id) }}" class="btn btn-secondary">Cancel</a>
        </div>

      </form>
    </div>

  </section>
</div>
{% endblock %}
