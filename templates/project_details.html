{% extends 'layout.html' %}

{% block content %}
<h1>{{ project.name }}</h1>

<div>Description</div>
<div>{{ project.description }}</div>

<h2>Members</h2>

<ul>
{% for member in project.members %}
    <li>{{ member.username }}</li>
{% endfor %}
</ul>

{% if current_user.role == "admin" %}
<form method="POST" action="{{ url_for('add_member', id=project.id) }}">
    <select name="user_id">
    {% for user in users %}
      <option value="{{ user.id }}">{{ user.username }}</option>
    {% endfor %}
  </select>
  <button type="submit">Add Member</button>
</form>
{% endif %}

<a href="{{ url_for('view_projects') }}">Back to Projects</a>
{% endblock %}
